service: amazon-now-snap

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-south-1
  stage: ${opt:stage, 'dev'}
  httpApi:
    cors:
      allowedOrigins:
        - https://master.dogt4l5r4vcs.amplifyapp.com
        - http://localhost:3000
        - http://localhost:5000
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:BatchGetItem
            - dynamodb:BatchWriteItem
          Resource:
            - arn:aws:dynamodb:ap-south-1:126697142700:table/Dev-*
        - Effect: Allow
          Action:
            - bedrock:InvokeModel
          Resource:
            - arn:aws:bedrock:ap-south-1::foundation-model/anthropic.claude-3-haiku-20240307-v1:0
  environment:
    NODE_ENV: production
    # DYNAMODB_ENDPOINT is intentionally omitted for cloud deployment — SDK uses native AWS endpoint
    DYNAMODB_TABLE_PREFIX: Dev-
    # AWS_REGION is reserved by Lambda — it is injected automatically
    LOG_LEVEL: info
    ENABLE_OPENSEARCH: 'false'
    ENABLE_REDIS: 'false'
    ENABLE_PERSONALIZE: 'false'
    ENABLE_BEDROCK: 'true'
    BEDROCK_MODEL_ID: 'anthropic.claude-3-haiku-20240307-v1:0'
    BEDROCK_REGION: 'ap-south-1'
    ENABLE_REKOGNITION: 'false'
    ENABLE_TRANSCRIBE: 'false'
    SKIP_AUTH_IN_DEV: 'false'

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3000
    host: localhost
    noPrependStageInUrl: true
    noAuth: true

package:
  individually: false
  patterns:
    - '!tests/**'
    - '!cdk/**'
    - '!scripts/**'
    - '!.env*'
    - '!src/**'
    - '!coverage/**'
    - '!*.ts'
    - '!tsconfig*.json'
    - '.build/**'
    - 'node_modules/**'

functions:
  # ── Products ──────────────────────────────────────────────────────────────
  getProduct:
    handler: .build/src/handlers/products.getProduct
    events:
      - httpApi:
          path: /v1/products/{productId}
          method: GET

  searchProducts:
    handler: .build/src/handlers/products.searchProductsHandler
    events:
      - httpApi:
          path: /v1/products/search
          method: GET

  getTrending:
    handler: .build/src/handlers/products.getTrendingHandler
    events:
      - httpApi:
          path: /v1/products/trending
          method: GET

  getBarcode:
    handler: .build/src/handlers/products.getBarcodeHandler
    events:
      - httpApi:
          path: /v1/products/barcode/{code}
          method: GET

  # ── Inventory ─────────────────────────────────────────────────────────────
  checkStock:
    handler: .build/src/handlers/inventory.checkStockHandler
    events:
      - httpApi:
          path: /v1/inventory/{pincode}/{productId}
          method: GET

  batchCheck:
    handler: .build/src/handlers/inventory.batchCheckHandler
    events:
      - httpApi:
          path: /v1/inventory/batch-check
          method: POST

  # ── ETA ───────────────────────────────────────────────────────────────────
  calculateETA:
    handler: .build/src/handlers/eta.calculateETAHandler
    events:
      - httpApi:
          path: /v1/eta
          method: GET

  batchETA:
    handler: .build/src/handlers/eta.batchETAHandler
    events:
      - httpApi:
          path: /v1/eta/batch
          method: POST

  # ── Intent ────────────────────────────────────────────────────────────────
  resolveTextIntent:
    handler: .build/src/handlers/intent.resolveTextIntentHandler
    events:
      - httpApi:
          path: /v1/intent/text
          method: POST

  resolveVoiceIntent:
    handler: .build/src/handlers/intent.resolveVoiceIntentHandler
    events:
      - httpApi:
          path: /v1/intent/voice
          method: POST

  # ── Smart Cart ────────────────────────────────────────────────────────────
  getSmartCart:
    handler: .build/src/handlers/smartCart.getSmartCartHandler
    events:
      - httpApi:
          path: /v1/smart-cart
          method: GET

  refreshSmartCart:
    handler: .build/src/handlers/smartCart.refreshSmartCartHandler
    events:
      - httpApi:
          path: /v1/smart-cart/refresh
          method: POST

  # ── Orders ────────────────────────────────────────────────────────────────
  placeOrder:
    handler: .build/src/handlers/orders.placeOrderHandler
    events:
      - httpApi:
          path: /v1/orders
          method: POST

  getOrderHistory:
    handler: .build/src/handlers/orders.getOrderHistoryHandler
    events:
      - httpApi:
          path: /v1/orders
          method: GET

  getRecentOrders:
    handler: .build/src/handlers/orders.getRecentOrdersHandler
    events:
      - httpApi:
          path: /v1/orders/recent
          method: GET

  getOrder:
    handler: .build/src/handlers/orders.getOrderHandler
    events:
      - httpApi:
          path: /v1/orders/{orderId}
          method: GET

  reorder:
    handler: .build/src/handlers/orders.reorderHandler
    events:
      - httpApi:
          path: /v1/orders/{orderId}/reorder
          method: POST
