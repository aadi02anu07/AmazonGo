version: '3.8'

services:
  # DynamoDB Local for development and testing
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: snap-dynamodb-local
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    networks:
      - snap-network

  # Redis for caching (Production mode simulation)
  redis-local:
    image: redis:7-alpine
    container_name: snap-redis-local
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - snap-network
    command: redis-server --appendonly yes

  # OpenSearch for search (Production mode simulation)
  opensearch-local:
    image: opensearchproject/opensearch:2.11.0
    container_name: snap-opensearch-local
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - snap-network

  # OpenSearch Dashboards (optional, for development)
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.0
    container_name: snap-opensearch-dashboards
    ports:
      - "5601:5601"
    environment:
      - 'OPENSEARCH_HOSTS=["http://opensearch-local:9200"]'
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      - opensearch-local
    networks:
      - snap-network

volumes:
  dynamodb-data:
    driver: local
  redis-data:
    driver: local
  opensearch-data:
    driver: local

networks:
  snap-network:
    driver: bridge
